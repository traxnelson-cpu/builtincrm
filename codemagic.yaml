workflows:
  android-release:
    name: Builtin CRM - Android APK
    max_build_duration: 60
    environment:
      flutter: 3.24.3
      java: 17
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-shrink
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - traxnelson@gmail.com
        notify:
          success: true
          failure: true
