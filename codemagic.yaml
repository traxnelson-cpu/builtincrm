workflows:
  android-release:
    name: Builtin CRM - Android APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Extract Flutter project from zip
        script: |
          unzip -o builtin_crm_flutter_source.zip -d extracted/
          cp -r extracted/builtin_crm_app/. .
      - name: Patch Android Gradle Plugin version
        script: |
          python3 -c "
          content = open('android/settings.gradle').read()
          content = content.replace('version \"8.1.0\" apply false', 'version \"8.3.0\" apply false')
          open('android/settings.gradle', 'w').write(content)
          print('AGP patched to 8.3.0')
          "
          python3 -c "
          import re
          content = open('android/gradle/wrapper/gradle-wrapper.properties').read()
          content = re.sub(r'distributionUrl=.*', 'distributionUrl=https\\\\://services.gradle.org/distributions/gradle-8.7.0-bin.zip', content)
          open('android/gradle/wrapper/gradle-wrapper.properties', 'w').write(content)
          print('Gradle wrapper patched to 8.7.0')
          "
          cat android/settings.gradle
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --no-shrink --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - traxnelson@gmail.com
        notify:
          success: true
          failure: true
